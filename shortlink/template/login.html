<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorty Auth</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    body {
      background: radial-gradient(circle at top left, #0b1220, #050a14);
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    .brand {
      color: #60a5fa;
      margin-bottom: 24px;
      font-size: 18px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 32px;
      backdrop-filter: blur(6px);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 24px;
    }

    label {
      margin-bottom: 8px;
      color: #9ca3af;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0f172a;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #1d4ed8;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease;
    }

    .btn:hover {
      background: #2563eb;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #9ca3af;
    }

    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .error {
      margin-top: 16px;
      font-size: 13px;
      color: #f87171;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="brand">$ shorty auth</div>

    <h1>Welcome back</h1>
    <p class="subtitle">Log in to manage your links.</p>

    <div class="card">
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" class="btn">Sign In</button>
        <div class="error" id="errorMsg">Invalid credentials.</div>
      </form>
    </div>

    <p class="footer">
      New here? <a href="#">Create account</a>
    </p>
  </div>

  <script>
    const inputEmail = document.getElementById("email");
    const inputPassword = document.getElementById("password");
    const form = document.getElementById("loginForm");
    const error = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      error.style.display = "none";
      // result.style.display = "none";

      const email = inputEmail.value.trim();

      try {

        let payload = {
          "email": inputEmail.value,
          "password": inputPassword.value
        }
        var requestedWebsite = "/api/auth/"
        console.log("Posting to: ", requestedWebsite)
        console.log("Payload: ", payload)
        const res = await fetch(requestedWebsite, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error("Request failed");
        }

        const data = await res.json();

        // console.log(data)

        if (data.redirect) {
          window.location.href = data.redirect;
        }

      } catch (err) {
        console.log(err, "Unable to shorten URL.", "block")
      }
    });
  </script>

</body>

</html>
