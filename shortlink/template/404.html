<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Shorty</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top left, #0b1220, #050a14);
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 600px;
  padding: 32px;
}

.brand {
  color: #60a5fa;
  margin-bottom: 32px;
  font-size: 18px;
  text-align: left;
}

.code {
  font-size: 96px;
  font-weight: bold;
  color: #1d4ed8;
  margin-bottom: 16px;
  letter-spacing: 4px;
}

.message {
  font-size: 20px;
  margin-bottom: 16px;
}

.subtext {
  color: #9ca3af;
  margin-bottom: 32px;
  font-size: 14px;
}

.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 8px;
  background: #1d4ed8;
  color: white;
  text-decoration: none;
  font-size: 14px;
  transition: background 0.2s ease, transform 0.05s ease;
}

.btn:hover {
  background: #2563eb;
}

.btn:active {
  transform: scale(0.98);
}

.glitch {
  position: relative;
  display: inline-block;
}

.glitch::before,
.glitch::after {
  content: "404";
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0.6;
}

.glitch::before {
  color: #60a5fa;
  transform: translate(2px, -2px);
}

.glitch::after {
  color: #f87171;
  transform: translate(-2px, 2px);
}

/* subtle animated background grid */
.grid {
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: rotate(0deg);
  animation: moveGrid 20s linear infinite;
  z-index: -1;
}

@keyframes moveGrid {
  from { transform: translate(0,0); }
  to { transform: translate(-40px,-40px); }
}
</style>
</head>

<body>
<div class="grid"></div>

<div class="container">
  <div class="brand">$ shorty redirect</div>

  <div class="code glitch">404</div>

  <div class="message">Link not found.</div>
  <div class="subtext">
    The short link you’re looking for doesn’t exist,<br>
    expired, or was mistyped.
  </div>

  <a href="/" class="btn">← Back to Dashboard</a>
</div>

</body>
</html>
