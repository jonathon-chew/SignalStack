<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Shorty</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    body {
      background: radial-gradient(circle at top left, #0b1220, #050a14);
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    .brand {
      color: #60a5fa;
      margin-bottom: 24px;
      font-size: 18px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 32px;
      backdrop-filter: blur(6px);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    label {
      margin-bottom: 8px;
      color: #9ca3af;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #0f172a;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
    }

    .password-strength {
      font-size: 12px;
      margin-top: 6px;
      color: #9ca3af;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #1d4ed8;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease;
      margin-top: 10px;
    }

    .btn:hover {
      background: #2563eb;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .error {
      margin-top: 12px;
      font-size: 13px;
      color: #f87171;
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #9ca3af;
    }

    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="brand">$ shorty signup</div>

    <h1>Create account</h1>
    <p class="subtitle">Start shortening links in seconds.</p>

    <div class="card">
      <form id="signupForm">

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
          <div class="password-strength" id="strengthText"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" required />
        </div>

        <button type="submit" class="btn">Create Account</button>
        <div class="error" id="errorMsg"></div>

      </form>
    </div>

    <p class="footer">
      Already have an account? <a href="/login/">Sign in</a>
    </p>
  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const strengthText = document.getElementById("strengthText");

    passwordInput.addEventListener("input", () => {
      const val = passwordInput.value;
      if (val.length === 0) {
        strengthText.textContent = "";
      } else if (val.length < 6) {
        strengthText.textContent = "Weak password";
        strengthText.style.color = "#f87171";
      } else if (val.length < 10) {
        strengthText.textContent = "Moderate password";
        strengthText.style.color = "#facc15";
      } else {
        strengthText.textContent = "Strong password";
        strengthText.style.color = "#4ade80";
      }
    });

    async function postForm(payload) {
        const res = await fetch("/auth/signup/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error("Request failed");
        }

        const data = await res.json();
      };

    document.getElementById("signupForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const confirm = document.getElementById("confirm").value;
      const error = document.getElementById("errorMsg");

      error.style.display = "none";

      if (!email || !password || !confirm) {
        error.textContent = "All fields are required.";
        error.style.display = "block";
        return;
      }

      if (password !== confirm) {
        error.textContent = "Passwords do not match.";
        error.style.display = "block";
        return;
      }

      if (password.length < 6) {
        error.textContent = "Password must be at least 6 characters.";
        error.style.display = "block";
        return;
      }

      // Replace with real POST to your Go backend

      }
    });
  </script>

</body>

</html>
