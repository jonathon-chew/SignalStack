<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shorty — Fast URL Shortener</title>

<style>
:root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent-hover: #1f6feb;
    --success: #3fb950;
    --error: #f85149;
    --text: #c9d1d9;
    --muted: #8b949e;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 3rem 1rem;
}

.container {
    width: 100%;
    max-width: 700px;
}

.header {
    margin-bottom: 2rem;
}

.logo {
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 1.2rem;
    color: var(--accent);
}

h1 {
    margin: 0.5rem 0;
    font-weight: 600;
}

.subtitle {
    color: var(--muted);
    font-size: 0.95rem;
}

.card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
}

form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

input {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, monospace;
    font-size: 0.9rem;
}

input:focus {
    outline: none;
    border-color: var(--accent);
}

button {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 0.75rem;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s ease;
}

button:hover {
    background: var(--accent-hover);
}

.result {
    margin-top: 1.5rem;
    padding: 1rem;
    background: #0b1220;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: none;
}

.result a {
    color: var(--success);
    text-decoration: none;
    font-family: ui-monospace, monospace;
}

.copy-btn {
    margin-top: 0.75rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
}

.copy-btn:hover {
    background: #1c2128;
}

.error {
    margin-top: 1rem;
    color: var(--error);
    display: none;
    font-size: 0.9rem;
}

.footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: ui-monospace, monospace;
}
</style>
</head>

<body>
<div class="container">

    <div class="header">
        <div class="logo">$ shorty</div>
        <h1>Fast. Minimal. Yours.</h1>
        <div class="subtitle">
            Simple URL shortening. No fluff. Just clean links.
        </div>
    </div>

    <div class="card">
        <form id="form">
            <input
                type="url"
                id="url"
                placeholder="https://example.com/very/long/link"
                required
                autofocus
            />
            <button type="submit">Generate Short Link</button>
        </form>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div id="shortLink"></div>
            <button class="copy-btn" id="copy">Copy</button>
        </div>
    </div>

    <div class="footer">
        Built for speed · Powered by Go
    </div>

</div>

<script>
const form = document.getElementById("form");
const urlInput = document.getElementById("url");
const result = document.getElementById("result");
const shortLink = document.getElementById("shortLink");
const error = document.getElementById("error");
const copyBtn = document.getElementById("copy");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    error.style.display = "none";
    result.style.display = "none";

    const url = urlInput.value.trim();

    try {
        var requestedWebsite = "/api/add/" + url
        console.log("Posting to: ", requestedWebsite)
        const res = await fetch(requestedWebsite, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({url})
        });

        if (!res.ok) {
            throw new Error("Request failed");
        }

        const data = await res.json();

        shortLink.innerHTML = `
            <a href="${data.short}" target="_blank">
                ${data.short}
            </a>
        `;

        result.style.display = "block";

    } catch (err) {
        console.log(err)
        error.textContent = "Unable to shorten URL.";
        error.style.display = "block";
    }
});

copyBtn.addEventListener("click", async () => {
    const text = shortLink.textContent;
    await navigator.clipboard.writeText(text);
    copyBtn.textContent = "Copied ✓";
    setTimeout(() => copyBtn.textContent = "Copy", 1500);
});
</script>

</body>
</html>
